name: Release — publish to npm

# Triggered by the tag push from the local `bun run release` script.
# CI on the underlying main commit gates correctness — this workflow
# just builds the artifact, sanity-checks the tag, and publishes via
# OIDC trusted publishing. No long-lived NPM_TOKEN involved.
#
# Setup required on npmjs.com (one-time, per package):
#   Package settings → Trusted publishing → Add publisher
#     - Organization or user: Fountain-Bio
#     - Repository: zebrash-ts
#     - Workflow filename: release-publish.yml
#     - Environment: (leave blank)
#
# See https://docs.npmjs.com/trusted-publishers.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # for the GitHub Release
  id-token: write # for npm OIDC trusted publishing

jobs:
  publish:
    name: Build + publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing requires npm >= 11.5.1, which is newer than what
      # ships bundled with Node 24. Force-install the latest npm.
      - name: Upgrade npm
        run: npm install --global npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag matches package versions
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/v}"
          for pkg in core node browser; do
            v=$(jq -r .version "packages/$pkg/package.json")
            if [ "$v" != "$tag" ]; then
              echo "::error::packages/$pkg/package.json version ($v) does not match tag ($tag)"
              exit 1
            fi
          done
          echo "::notice::all three packages at $tag"

      - name: Build all packages
        run: bun run build

      # `npm publish --workspace` rewrites `workspace:*` to the actual
      # version of the workspace package. OIDC publishing is automatic when
      # `id-token: write` is set and the package has a trusted publisher
      # configured on npm. Provenance attestations are emitted automatically
      # in OIDC mode — no extra flag needed.
      - name: Publish @zebrash/core
        run: npm publish --workspace @zebrash/core --access public

      - name: Publish @zebrash/node
        run: npm publish --workspace @zebrash/node --access public

      - name: Publish @zebrash/browser
        run: npm publish --workspace @zebrash/browser --access public

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
